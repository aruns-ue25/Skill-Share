<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — SkillShare</title>
    <link rel="stylesheet" th:href="@{/css/glass-login.css}">
    <style>
        .form-group.row-group {
            display: flex;
            gap: 16px;
            margin-bottom: 1.1rem;
        }

        .form-group.row-group .col {
            flex: 1;
        }

        .form-group.row-group .col label {
            margin-bottom: .4rem;
            display: block;
        }

        /* Password toggle */
        .pw-wrapper {
            position: relative;
        }

        .pw-wrapper .form-control {
            padding-right: 2.8rem;
        }

        .pw-toggle {
            position: absolute;
            right: .75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted, #64748b);
            padding: 0;
            line-height: 1;
            font-size: 1rem;
            transition: color .2s;
        }

        .pw-toggle:hover {
            color: var(--primary, #3b82f6);
        }
    </style>
</head>

<body>
    <!-- Topbar matching home/about pages -->
    <nav class="auth-topbar">
        <a th:href="@{/}" class="auth-topbar-brand">&#x21C6; SkillShare</a>
        <a th:href="@{/}" class="auth-topbar-link">&#8592; Back to Home</a>
    </nav>

    <div class="page-background">
        <div class="glass-card" style="max-width: 480px;">
            <div class="card-content">
                <div class="logo-container">
                    <img src="/images/logo_ss.png" alt="Skill-Share Logo" class="custom-logo">
                </div>

                <div class="login-header">
                    <h3>Create Account</h3>
                    <p>Join SkillShare and start exchanging skills</p>
                </div>

                <div th:if="${error}" class="alert alert-error" th:text="${error}">
                </div>

                <form th:action="@{/register}" method="post" th:object="${user}">

                    <div class="form-group row-group">
                        <div class="col">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" name="fullName" class="form-control" th:field="*{fullName}"
                                placeholder="John Doe" required autofocus />
                        </div>
                    </div>

                    <div class="form-group row-group">
                        <div class="col">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" class="form-control" th:field="*{email}"
                                placeholder="username@gmail.com" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="pw-wrapper">
                            <input type="password" id="password" name="password" class="form-control"
                                th:field="*{password}" placeholder="Password" required minlength="6" />
                            <button type="button" class="pw-toggle" id="pw-toggle-btn" aria-label="Show password"
                                onclick="(function(){
                                    var i=document.getElementById('password');
                                    var b=document.getElementById('pw-toggle-btn');
                                    if(i.type==='password'){i.type='text';b.innerHTML='&#128065;&#65039;';}
                                    else{i.type='password';b.innerHTML='&#128065;';}
                                })()">
                                &#128065;
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 24px;">Register</button>
                </form>



                <div class="register-link">
                    Already have an account? <a th:href="@{/login}">Log in</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
