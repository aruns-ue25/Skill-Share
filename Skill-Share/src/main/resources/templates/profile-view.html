<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your SkillShare profile — manage your account details.">
    <title>My Profile — SkillShare</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #93c5fd;
            --primary-subtle: #eff6ff;
            --accent: #6366f1;
            --text-dark: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --card-border: rgba(148, 163, 184, .15);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, .08), 0 4px 8px rgba(0, 0, 0, .04);
            --radius: 1rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: var(--text-body);
            background: var(--bg-light);
            margin: 0;
            min-height: 100vh;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--card-border);
            padding: .75rem 0;
            position: sticky;
            top: 0;
            z-index: 1050;
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.35rem;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -.02em;
        }

        .profile-page {
            padding: 3rem 1rem 4rem;
            background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 50%, #eff6ff 100%);
            min-height: calc(100vh - 140px);
        }

        .profile-card {
            background: #fff;
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .profile-card-hero {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 2.5rem 2rem 4rem;
            text-align: center;
        }

        .profile-avatar-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 1rem;
            position: relative;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .22);
            border: 3px solid rgba(255, 255, 255, .5);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 3rem;
            color: #fff;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-card-hero h2 {
            color: #fff;
            margin: 0;
            font-size: 1.6rem;
            font-weight: 800;
        }

        .profile-card-hero p {
            color: rgba(255, 255, 255, .85);
            margin: 0.2rem 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 1rem;
            border-radius: 50rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 1rem;
            text-transform: uppercase;
        }

        .status-available {
            background: #dcfce7;
            color: #166534;
        }

        .status-unavailable {
            background: #fee2e2;
            color: #991b1b;
        }

        .profile-body {
            padding: 2.5rem;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            letter-spacing: 0.05em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-item {
            display: flex;
            gap: 1rem;
            padding: 1.25rem;
            background: var(--bg-light);
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            transition: transform 0.2s;
        }

        .info-item:hover {
            transform: translateY(-2px);
        }

        .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .icon-blue {
            background: #eff6ff;
            color: #3b82f6;
        }

        .icon-green {
            background: #f0fdf4;
            color: #16a34a;
        }

        .icon-purple {
            background: #f5f3ff;
            color: #7c3aed;
        }

        .icon-orange {
            background: #fff7ed;
            color: #ea580c;
        }

        .bio-box {
            background: var(--bg-light);
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-custom {
            border-radius: 50rem;
            padding: 0.7rem 1.8rem;
            font-weight: 700;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            border: none;
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
            color: #fff;
        }

        .btn-light-primary {
            background: var(--primary-subtle);
            color: var(--primary-dark);
        }

        .btn-light-primary:hover {
            background: #dbeafe;
            transform: translateY(-2px);
            color: var(--primary-dark);
        }

        .btn-outline {
            border: 1.5px solid var(--card-border);
            background: #fff;
            color: var(--text-body);
        }

        .btn-outline:hover {
            background: var(--bg-light);
            color: var(--primary);
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .footer {
            background: var(--text-dark);
            color: #94a3b8;
            text-align: center;
            padding: 2rem 1rem;
            font-size: .88rem;
        }
    </style>
</head>

<body>
    <nav class="navbar-custom">
        <div class="container d-flex justify-content-between align-items-center">
            <a th:href="@{/active-users}" style="text-decoration:none;"><span class="navbar-brand-text"><i
                        class="bi bi-arrow-left-right me-1"></i>SkillShare</span></a>
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/active-users}" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                    <i class="bi bi-people-fill me-1"></i>Discover Users
                </a>
                <form th:action="@{/logout}" method="post"><button type="submit"
                        class="btn btn-sm btn-outline-danger rounded-pill"><i
                            class="bi bi-box-arrow-right me-1"></i>Logout</button></form>
            </div>
        </div>
    </nav>

    <main class="profile-page">
        <div class="container" style="max-width: 800px;">

            <div th:if="${successMessage}"
                class="alert alert-success alert-dismissible fade show rounded-4 mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="profile-card">
                <div class="profile-card-hero">
                    <div class="profile-avatar-container">
                        <div class="profile-avatar">
                            <img th:if="${profile.profilePictureUrl}" th:src="${profile.profilePictureUrl}"
                                alt="Avatar">
                            <i th:unless="${profile.profilePictureUrl}" class="bi bi-person-fill"></i>
                        </div>
                    </div>
                    <h2 th:text="${profile.fullName}">John Doe</h2>
                    <p th:text="${profile.email}">john@example.com</p>

                    <div
                        th:class="'status-badge ' + (${profile.availabilityStatus.name() == 'AVAILABLE'} ? 'status-available' : 'status-unavailable')">
                        <i
                            th:class="'bi ' + (${profile.availabilityStatus.name() == 'AVAILABLE'} ? 'bi-circle-fill' : 'bi-dash-circle-fill')"></i>
                        <span th:text="${profile.availabilityStatus}">AVAILABLE</span>
                    </div>
                </div>

                <div class="profile-body">
                    <div class="section-title">Personal Information</div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-icon icon-blue"><i class="bi bi-telephone-fill"></i></div>
                            <div>
                                <div class="section-title mb-1" style="font-size:0.65rem;">Phone Number</div>
                                <div class="fw-bold" th:text="${profile.phoneNumber ?: 'Not provided'}"></div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon icon-orange"><i class="bi bi-geo-alt-fill"></i></div>
                            <div>
                                <div class="section-title mb-1" style="font-size:0.65rem;">Location</div>
                                <div class="fw-bold" th:text="${profile.location ?: 'Not provided'}"></div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon icon-purple"><i class="bi bi-mortarboard-fill"></i></div>
                            <div>
                                <div class="section-title mb-1" style="font-size:0.65rem;">University</div>
                                <div class="fw-bold" th:text="${profile.university ?: 'Not provided'}"></div>
                            </div>
                        </div>
                    </div>

                    <div class="section-title">About Me</div>
                    <div class="bio-box">
                        <p class="mb-0 text-muted"
                            th:text="${profile.bio ?: 'Tell others about your skills and interests...'}"></p>
                    </div>

                    <div class="section-title" th:if="${not #lists.isEmpty(mainSkills)}">Main Skills Offered</div>
                    <div class="d-flex flex-wrap gap-2 mb-4" th:if="${not #lists.isEmpty(mainSkills)}">
                        <div th:each="skill : ${mainSkills}" class="badge rounded-pill px-3 py-2 border d-flex align-items-center gap-2" 
                             style="background: #fff; color: var(--text-dark); border-color: var(--primary-light) !important;">
                            <i class="bi bi-star-fill text-warning" style="font-size: 0.8rem;"></i>
                            <span th:text="${skill.name}" class="fw-bold">Skill Name</span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 pt-3 border-top">
                        <div class="d-flex gap-2 flex-wrap">
                            <a th:href="@{/skills}" class="btn-custom btn-primary-gradient">
                                <i class="bi bi-tools"></i> Manage Skills
                            </a>
                            <a th:href="@{/profile/edit}" class="btn-custom btn-light-primary">
                                <i class="bi bi-pencil-square"></i> Edit Profile
                            </a>
                            <form th:action="@{/profile/availability/toggle}" method="post" style="margin:0;">
                                <button type="submit" class="btn-custom btn-outline">
                                    <i class="bi bi-arrow-repeat"></i> Toggle Availability
                                </button>
                            </form>
                        </div>
                        <a th:href="@{/active-users}" class="btn-custom btn-outline"><i class="bi bi-house"></i>Back to Directory</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 SkillShare. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
