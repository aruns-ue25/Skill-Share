<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — SkillShare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #6366f1;
            --text-dark: #0f172a;
            --text-body: #334155;
            --bg-light: #f8fafc;
            --card-border: rgba(148, 163, 184, .15);
            --radius: 1rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-light);
            color: var(--text-body);
        }

        .edit-page {
            padding: 4rem 1rem;
            min-height: 100vh;
            background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 100%);
        }

        .edit-card {
            background: #fff;
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
        }

        .form-label { font-weight: 700; color: var(--text-dark); margin-bottom: 0.5rem; }
        .form-control { border-radius: 0.75rem; padding: 0.75rem 1rem; border: 1.5px solid var(--card-border); transition: border-color 0.2s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        .error-message { color: #dc2626; font-size: 0.85rem; margin-top: 0.4rem; font-weight: 500; }
        .form-control.is-invalid { border-color: #dc2626; }

        .btn-custom { border-radius: 50rem; padding: 0.75rem 2rem; font-weight: 700; border: none; transition: all 0.2s; }
        .btn-primary-gradient { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; }
        .btn-primary-gradient:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3); }
        
        .btn-cancel { background: #f1f5f9; color: #475569; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn-cancel:hover { background: #e2e8f0; color: #1e293b; }

        .header-title { font-weight: 800; letter-spacing: -0.02em; color: var(--text-dark); margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; }
    </style>
</head>

<body>
    <main class="edit-page">
        <div class="container" style="max-width: 650px;">
            <div class="edit-card">
                <h2 class="header-title">
                    <i class="bi bi-pencil-square text-primary"></i>
                    Update Your Profile
                </h2>

                <form th:action="@{/profile/edit}" th:object="${profileUpdateDTO}" method="post" enctype="multipart/form-data">
                    
                    <div class="mb-4">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" th:field="*{fullName}" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''" placeholder="Enter your full name">
                        <div class="error-message" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="bio" class="form-label">Bio</label>
                        <textarea th:field="*{bio}" class="form-control" rows="4" th:classappend="${#fields.hasErrors('bio')} ? 'is-invalid' : ''" placeholder="Tell us about yourself..."></textarea>
                        <div class="error-message" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="phoneNumber" class="form-label">Phone Number</label>
                            <input type="text" th:field="*{phoneNumber}" class="form-control" th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid' : ''" placeholder="e.g. +123456789">
                            <div class="error-message" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" th:field="*{location}" class="form-control" th:classappend="${#fields.hasErrors('location')} ? 'is-invalid' : ''" placeholder="City, Country">
                            <div class="error-message" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="profilePicture" class="form-label">Profile Picture</label>
                        <input type="file" th:field="*{profilePicture}" class="form-control" accept="image/jpeg,image/png">
                        <div class="error-message" th:if="${#fields.hasErrors('profilePicture')}" th:errors="*{profilePicture}"></div>
                        <div class="error-message" th:if="${pictureError}" th:text="${pictureError}"></div>
                        <div class="form-text mt-2">Allowed formats: JPG, PNG. Max size: 5MB.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Main Skills to Highlight</label>
                        <p class="text-muted small mb-3">Select up to 5 skills you want to feature on your profile.</p>
                        <input type="hidden" th:field="*{mainSkillIdsString}" id="mainSkillIdsString">
                        <div class="skills-selection-grid p-3 border rounded-4 bg-light">
                            <div th:if="${#lists.isEmpty(allSkills)}" class="text-center py-2">
                                <span class="text-muted small">No skills added yet. <a th:href="@{/skills}">Add some skills</a> first.</span>
                            </div>
                            <div class="row row-cols-1 row-cols-md-2 g-2">
                                <div class="col" th:each="skill : ${allSkills}">
                                    <div class="form-check">
                                        <input class="form-check-input main-skill-checkbox" type="checkbox" 
                                               th:value="${skill.id}" 
                                               th:checked="${profileUpdateDTO.mainSkillIds != null && profileUpdateDTO.mainSkillIds.contains(skill.id)}"
                                               th:id="'skill-' + ${skill.id}">
                                        <label class="form-check-label small fw-bold text-dark" th:for="'skill-' + ${skill.id}" th:text="${skill.name}">
                                            Skill Name
                                        </label>
                                        <div class="text-muted" style="font-size: 0.7rem;" th:text="${skill.category}">Category</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 pt-3">
                        <button type="submit" class="btn-custom btn-primary-gradient flex-grow-1">Save Profile Changes</button>
                        <a th:href="@{/profile}" class="btn-custom btn-cancel">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const checkboxes = document.querySelectorAll('.main-skill-checkbox');
            const hiddenInput = document.getElementById('mainSkillIdsString');
            const maxSelection = 5;

            function updateHiddenInput() {
                const checkedValues = Array.from(document.querySelectorAll('.main-skill-checkbox:checked'))
                    .map(cb => cb.value);
                hiddenInput.value = checkedValues.join(',');
            }

            checkboxes.forEach(cb => {
                cb.addEventListener('change', function() {
                    const checkedCount = document.querySelectorAll('.main-skill-checkbox:checked').length;
                    if (checkedCount > maxSelection) {
                        this.checked = false;
                        alert('You can only select up to ' + maxSelection + ' main skills.');
                    }
                    updateHiddenInput();
                });
            });

            // Initial sync
            updateHiddenInput();
        });
    </script>
</body>
</html>
