<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your SkillShare profile — manage your account details.">
    <title>My Profile — SkillShare</title>
    <!-- Bootstrap CSS: preloaded for fastest render -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style"
        onload="this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </noscript>
    <!-- Bootstrap Icons: non-render-blocking -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </noscript>

    <style>
        /* ── Design Tokens (identical to home / about) ── */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #93c5fd;
            --primary-subtle: #eff6ff;
            --accent: #6366f1;
            --text-dark: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --card-border: rgba(148, 163, 184, .15);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, .06), 0 1px 2px rgba(0, 0, 0, .04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, .07), 0 2px 4px rgba(0, 0, 0, .04);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, .08), 0 4px 8px rgba(0, 0, 0, .04);
            --radius: 1rem;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: var(--text-body);
            background: var(--bg-light);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar (identical to home / about) ─────── */
        .navbar-custom {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--card-border);
            padding: .75rem 0;
            position: sticky;
            top: 0;
            z-index: 1050;
            transition: box-shadow .3s ease;
        }

        .navbar-custom.scrolled {
            box-shadow: var(--shadow-sm);
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.35rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -.02em;
        }

        .nav-link-page {
            color: var(--text-muted);
            font-weight: 500;
            font-size: .92rem;
            text-decoration: none;
            padding: .4rem .8rem;
            border-radius: .5rem;
            transition: color .2s, background .2s;
        }

        .nav-link-page:hover {
            color: var(--primary);
            background: var(--primary-subtle);
        }

        .nav-btn-logout {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            padding: 0 1.2rem;
            font-size: .9rem;
            font-weight: 600;
            color: var(--text-body);
            background: var(--bg-light);
            border: 1.5px solid var(--card-border);
            border-radius: 50rem;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            transition: background .2s, border-color .2s, color .2s;
        }

        .nav-btn-logout:hover {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
        }

        /* ── Page content area ───────────────────────── */
        .profile-page {
            flex: 1;
            padding: 3rem 1rem 4rem;
            background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 50%, #eff6ff 100%);
            position: relative;
            overflow: hidden;
        }

        /* Matching decorative blurs from hero sections */
        .profile-page::before,
        .profile-page::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: .3;
            pointer-events: none;
        }

        .profile-page::before {
            width: 380px;
            height: 380px;
            background: var(--primary-light);
            top: -100px;
            left: -80px;
        }

        .profile-page::after {
            width: 300px;
            height: 300px;
            background: #c4b5fd;
            bottom: -60px;
            right: -60px;
        }

        /* ── Profile Card ────────────────────────────── */
        .profile-card {
            background: #fff;
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: fadeUp .6s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card hero strip */
        .profile-card-hero {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 2.5rem 2rem 4rem;
            text-align: center;
            position: relative;
        }

        /* Avatar circle */
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .22);
            border: 3px solid rgba(255, 255, 255, .5);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: #fff;
            margin-bottom: 1rem;
        }

        .profile-card-hero h2 {
            color: #fff;
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: -.02em;
            margin: 0 0 .3rem;
        }

        .profile-card-hero p {
            color: rgba(255, 255, 255, .8);
            font-size: .9rem;
            margin: 0;
        }

        /* Role badge */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            margin-top: .8rem;
            background: rgba(255, 255, 255, .2);
            color: #fff;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            padding: .3rem .85rem;
            border-radius: 50rem;
            border: 1px solid rgba(255, 255, 255, .25);
        }

        /* Card body */
        .profile-card-body {
            padding: 2rem;
        }

        /* Info rows */
        .info-section-title {
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background: var(--bg-light);
            border: 1px solid var(--card-border);
            border-radius: .75rem;
            margin-bottom: .75rem;
            transition: box-shadow .2s;
        }

        .info-row:hover {
            box-shadow: var(--shadow-md);
        }

        .info-row-icon {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: .6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .icon-name {
            background: #eff6ff;
            color: var(--primary);
        }

        .icon-email {
            background: #f0fdf4;
            color: #16a34a;
        }

        .icon-role {
            background: #fef3c7;
            color: #d97706;
        }

        .info-row-content {
            flex: 1;
            min-width: 0;
        }

        .info-row-label {
            font-size: .75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: .15rem;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .info-row-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Divider */
        .card-divider {
            height: 1px;
            background: var(--card-border);
            margin: 1.5rem 0;
        }

        /* Action buttons */
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .7rem 1.6rem;
            font-size: .93rem;
            font-weight: 700;
            font-family: inherit;
            border-radius: 50rem;
            text-decoration: none;
            cursor: pointer;
            transition: all .25s ease;
        }

        .btn-action-primary {
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            box-shadow: 0 4px 14px rgba(59, 130, 246, .3);
        }

        .btn-action-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, .45);
            color: #fff;
        }

        .btn-action-ghost {
            color: #dc2626;
            background: #fff;
            border: 1.5px solid #fecaca;
        }

        .btn-action-ghost:hover {
            background: #fef2f2;
            border-color: #dc2626;
            color: #dc2626;
        }

        .btn-action-secondary {
            color: var(--primary);
            background: var(--primary-subtle);
            border: 1px solid transparent;
        }

        .btn-action-secondary:hover {
            background: #dbeafe;
            color: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* ── Footer ──────────────────────────────────── */
        .footer {
            background: var(--text-dark);
            color: #94a3b8;
            text-align: center;
            padding: 2rem 1rem;
            font-size: .88rem;
        }

        .footer a {
            color: #cbd5e1;
            text-decoration: none;
            margin: 0 .7rem;
            transition: color .2s;
        }

        .footer a:hover {
            color: #fff;
        }

        .footer-divider {
            width: 50px;
            height: 1px;
            background: rgba(255, 255, 255, .1);
            margin: .8rem auto;
        }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 576px) {
            .profile-page {
                padding: 2rem .75rem 3rem;
            }

            .profile-card-body {
                padding: 1.5rem 1.2rem;
            }

            .info-row {
                padding: .85rem 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- ══ Navbar (identical to home / about) ══════════ -->
    <nav class="navbar-custom" id="navbar">
        <div class="container d-flex align-items-center justify-content-between">
            <span class="navbar-brand-text">
                <i class="bi bi-arrow-left-right me-1"></i>SkillShare
            </span>
            <div class="d-flex align-items-center gap-3">
                <!-- Logout form (POST required by Spring Security) -->
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="nav-btn-logout" id="logout-btn">
                        <i class="bi bi-box-arrow-right me-1"></i>Log out
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- ══ Profile Page ════════════════════════════════ -->
    <main class="profile-page" id="profile-main">
        <div class="container" style="max-width: 680px;">
            <div class="profile-card">

                <!-- Hero strip with avatar & name -->
                <div class="profile-card-hero">
                    <div class="profile-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <h2 th:text="${fullName}">John Doe</h2>
                    <p th:text="${email}">john@example.com</p>
                    <div class="role-badge">
                        <i class="bi bi-shield-fill-check"></i>
                        <span th:text="${role}">USER</span>
                    </div>
                </div>

                <!-- Info rows -->
                <div class="profile-card-body">
                    <div class="info-section-title">Account Details</div>

                    <div class="info-row">
                        <div class="info-row-icon icon-name">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div class="info-row-content">
                            <div class="info-row-label">Full Name</div>
                            <div class="info-row-value" th:text="${fullName}">John Doe</div>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-row-icon icon-email">
                            <i class="bi bi-envelope-fill"></i>
                        </div>
                        <div class="info-row-content">
                            <div class="info-row-label">Email Address</div>
                            <div class="info-row-value" th:text="${email}">john@example.com</div>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-row-icon icon-role">
                            <i class="bi bi-award-fill"></i>
                        </div>
                        <div class="info-row-content">
                            <div class="info-row-label">Account Role</div>
                            <div class="info-row-value" th:text="${role}">USER</div>
                        </div>
                    </div>

                    <div class="card-divider"></div>

                    <!-- Actions -->
                    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <a th:href="@{/skills}" class="btn-action btn-action-primary" id="manage-skills-btn">
                                <i class="bi bi-tools"></i> Manage My Skills
                            </a>
                            <button type="button" class="btn-action btn-action-secondary" id="explore-btn" disabled
                                style="opacity:.6;cursor:not-allowed;">
                                <i class="bi bi-compass-fill"></i> Explore Skills
                            </button>
                        </div>
                        <form th:action="@{/logout}" method="post" style="margin:0;">
                            <button type="submit" class="btn-action btn-action-ghost" id="profile-logout-btn">
                                <i class="bi bi-box-arrow-right"></i> Log out
                            </button>
                        </form>
                    </div>
                </div>

            </div><!-- /profile-card -->
        </div>
    </main>

    <!-- ══ Footer ══════════════════════════════════════ -->
    <footer class="footer" id="footer">
        <div class="container">
            <div>
                <a th:href="@{/about}" id="footer-about">About</a>
                <a href="#" id="footer-contact">Contact</a>
            </div>
            <div class="footer-divider"></div>
            <p class="mb-0">&copy; 2026 SkillShare. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Navbar shadow on scroll
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 10);
        });
    </script>
</body>

</html>
